name: Validate Skills

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate skill library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate skill folder structure
        shell: python
        run: |
          from pathlib import Path
          import sys

          root = Path.cwd()
          ignored = {'.git', '.github', 'dist', '__pycache__'}
          skill_dirs = []

          for path in sorted(root.iterdir()):
              if not path.is_dir() or path.name in ignored or path.name.startswith('.'):
                  continue
              if (path / 'SKILL.md').exists():
                  skill_dirs.append(path)

          if not skill_dirs:
              print('No skill folders with SKILL.md were found.')
              sys.exit(1)

          errors = []
          print('Detected skills:')
          for skill in skill_dirs:
              print(f'- {skill.name}')
              skill_md = skill / 'SKILL.md'
              content = skill_md.read_text(encoding='utf-8').strip()
              if len(content) < 50:
                  errors.append(f'{skill.name}: SKILL.md is too short or empty')

              openai_yaml = skill / 'agents' / 'openai.yaml'
              if not openai_yaml.exists():
                  errors.append(f'{skill.name}: missing agents/openai.yaml')

              scripts_dir = skill / 'scripts'
              if scripts_dir.exists():
                  for py_file in scripts_dir.rglob('*.py'):
                      compile(py_file.read_text(encoding='utf-8'), str(py_file), 'exec')

          if errors:
              print('\nValidation errors:')
              for error in errors:
                  print(f'- {error}')
              sys.exit(1)

          print('\nSkill structure validation passed.')

      - name: Check README skill catalog
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          root = Path.cwd()
          readme = root / 'README.md'
          if not readme.exists():
              print('README.md is missing.')
              sys.exit(1)

          text = readme.read_text(encoding='utf-8')
          actual = sorted(p.name for p in root.iterdir() if p.is_dir() and (p / 'SKILL.md').exists())
          listed = re.findall(r'^- `([^`]+)`', text, flags=re.MULTILINE)

          missing = [name for name in actual if name not in listed]
          stale = [name for name in listed if name not in actual]

          if missing or stale:
              if missing:
                  print('Skills missing from README catalog:')
                  for name in missing:
                      print(f'- {name}')
              if stale:
                  print('README catalog entries without skill folder:')
                  for name in stale:
                      print(f'- {name}')
              sys.exit(1)

          print('README skill catalog matches detected skill folders.')
